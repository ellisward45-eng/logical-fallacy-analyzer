<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logical Fallacy Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background-color: #f4f6f8;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    min-height: 160px;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
    resize: vertical;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    margin-top: 15px;
    border: none;
    border-radius: 6px;
    background-color: #2d6cdf;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #1f4fa8;
}

.results {
    margin-top: 25px;
    padding: 15px;
    background: #f9fafb;
    border-radius: 6px;
    white-space: pre-wrap;
    min-height: 60px;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #888;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Logical Fallacy Analyzer</h1>
    <p class="subtitle">Paste text below to analyze for logical fallacies.</p>

    <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    <button onclick="analyzeText()">Analyze</button>

    <div class="results" id="results"></div>

    <div class="footer">
        Text-only launch. Audio/video coming soon.
    </div>
</div>

<script>
function formatResults(data) {
  if (!data || !data.fallacies) return "Unexpected response.";

  if (data.fallacies.length === 0) {
    return data.message || "No logical fallacies detected.";
  }

  let out = "Detected Fallacies:\n\n";
  for (const f of data.fallacies) {
    const label = f.label || "Unknown";
    const percent = (typeof f.percent === "number") ? `${f.percent.toFixed(1)}%` : "";
    const sentence = f.sentence ? `Found in: “${f.sentence}”\n` : "";
    const explanation = f.explanation ? `Explanation: ${f.explanation}\n` : "";

    out += `${label} — ${percent}\n${sentence}${explanation}\n`;
  }
  return out.trim();
}

async function analyzeText() {
  const text = document.getElementById("textInput").value;
  const resultsEl = document.getElementById("results");

  if (!text.trim()) {
    alert("Please enter text to analyze.");
    return;
  }

  resultsEl.textContent = "Analyzing...";

  try {
    const response = await fetch("/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await response.json();

    if (!response.ok) {
      resultsEl.textContent = data?.message || data?.error || "Error processing request.";
      return;
    }

    resultsEl.textContent = formatResults(data);
  } catch (e) {
    resultsEl.textContent = "Could not connect to the analyzer.";
  }
}
</script>
</body>
</html>
