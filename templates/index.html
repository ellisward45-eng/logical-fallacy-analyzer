<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Spot the Lie?</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1828/1828843.png">

<style>

body{
font-family: Arial, sans-serif;
max-width: 720px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:140px;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
margin-top:10px;
border:none;
background:#222;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#444;
}

#result{
margin-top:20px;
padding:15px;
background:white;
border-radius:8px;
white-space:pre-wrap;
}

.example{
background:#e9e9e9;
padding:8px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
}

.example:hover{
background:#dcdcdc;
}

.notice{
margin-top:8px;
font-size:14px;
color:#555;
}

.tools{
margin-top:12px;
}

</style>

</head>

<body>

<h1>Spot the Lie?</h1>

<p>
Analyze statements and uncover flawed reasoning.
</p>

<textarea id="inputText" placeholder="Paste a message or statement..."></textarea>

<button onclick="runAnalysis()">Analyze</button>

<div class="notice">
Free daily analyses available
</div>

<h3>Examples</h3>

<div class="example" onclick="insertExample(this)">
You're either with us or against us.
</div>

<div class="example" onclick="insertExample(this)">
Everyone agrees, so it must be true.
</div>

<div class="example" onclick="insertExample(this)">
If we allow this, society will collapse.
</div>

<div class="example" onclick="insertExample(this)">
Only an idiot would disagree.
</div>

<div id="result"></div>

<div class="tools">

<button onclick="copyResult()">Copy result</button>

<button onclick="copyLink()">Copy link</button>

</div>

<script>

async function runAnalysis(){

const text=document.getElementById("inputText").value;

if(!text.trim()){
alert("enter text");
return;
}

const response=await fetch("/analyze",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({text:text})

});

const data=await response.json();

document.getElementById("result").innerText=
JSON.stringify(data,null,2);

}

function insertExample(el){

document.getElementById("inputText").value=el.innerText;

}

function copyResult(){

const text=document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("result copied");

}

function copyLink(){

navigator.clipboard.writeText(window.location.href);

alert("link copied");

}

</script>

<div style="margin-top:30px;font-size:14px;color:#666;text-align:center">

<a href="/terms">Terms</a> |
<a href="/privacy">Privacy</a> |
<a href="/disclaimer">Disclaimer</a>

</div>

</body>

</html>
